version: '3.8'

services:
  terrasecure:
    image: terrasecure:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terrasecure

    volumes:
      - ./examples:/scan:ro
      - ./output:/output

    command: ["/scan/vulnerable", "--format", "json", "--output", "/output/scan-results.json"]

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    read_only: false  
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.path.insert(0, 'src'); from ml.ml_analyzer import MLAnalyzer; MLAnalyzer()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: terrasecure-network