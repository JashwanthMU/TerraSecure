name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test & Build TerraSecure
    runs-on: ubuntu-latest
    
    steps:
      - name:   Checkout code
        uses: actions/checkout@v4
      
      - name:   Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name:   Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name:   Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name:   Build ML model (if missing)
        run: |
          if [ ! -f "models/terrasecure_production_v1.0.pkl" ]; then
            echo "   Building ML model..."
            python scripts/build_production_model.py
          else
            echo "  ML model already exists"
          fi
      
      - name:   Run TerraSecure CLI test
        run: |
          echo "Testing CLI help..."
          python src/cli.py --help
          
          echo "Testing scan on examples..."
          python src/cli.py examples/vulnerable --format text
      
      - name:   Generate JSON report
        run: |
          python src/cli.py examples/vulnerable --format json --output test-results.json
        continue-on-error: true
      
      - name:   Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: test-results.json
          retention-days: 30
      
      - name:   CI/CD Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TerraSecure CI/CD Pipeline - SUCCESS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Scan results available in artifacts"
          echo "  Ready for deployment"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name:   Checkout code
        uses: actions/checkout@v4
      
      - name:   Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name:   Build Docker image
        run: |
          docker build -t terrasecure:latest .
      
      - name:   Test Docker image
        run: |
          docker run --rm terrasecure:latest --help
      
      - name:   Docker Build Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Docker Image Built Successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          docker images terrasecure:latest