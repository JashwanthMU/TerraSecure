name: 'TerraSecure Security Scanner'
description: 'AI-Powered Terraform Security Scanner with ML risk scoring'
author: 'JashwanthMU'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to Terraform files to scan'
    required: false
    default: '.'
  
    format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'sarif'
  
  output:
    description: 'Output file path'
    required: false
    default: 'terrasecure-results.sarif'
  
  fail-on:
    description: 'Fail on severity level (critical, high, medium, low)'
    required: false
    default: 'high'
  
  upload-sarif:
    description: 'Upload SARIF to GitHub Security'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install TerraSecure
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
    
    - name: Check ML model
      shell: bash
      run: |
        if [ ! -f "${{ github.action_path }}/models/terrasecure_production_v1.0.pkl" ]; then
          echo "⚠️  ML model not found, building..."
          python ${{ github.action_path }}/scripts/build_production_model.py
        fi
    
    - name: Run TerraSecure scan
      shell: bash
      run: |
        python ${{ github.action_path }}/src/cli.py \
          ${{ inputs.path }} \
          --format ${{ inputs.format }} \
          --output ${{ inputs.output }} \
          --fail-on ${{ inputs.fail-on }}
    
    - name: Upload SARIF results
      if: inputs.upload-sarif == 'true' && inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output }}
        category: terrasecure