name: TerraSecure SARIF Upload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  terrasecure-scan:
    name: TerraSecure Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run TerraSecure Scan
        uses: docker://ghcr.io/jashwanthmu/terrasecure:latest
        with:
          args: /github/workspace --format sarif --output /github/workspace/terrasecure.sarif
      
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terrasecure.sarif
          category: terrasecure
      
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terrasecure-sarif
          path: terrasecure.sarif
          retention-days: 30