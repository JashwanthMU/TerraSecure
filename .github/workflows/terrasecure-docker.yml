name: TerraSecure (Docker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan with TerraSecure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run TerraSecure Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/scan:ro \
            -v ${{ github.workspace }}:/output \
            terrasecure:latest \
            /scan --format sarif --output /output/terrasecure.sarif
      
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terrasecure.sarif